<gyno-topbar title="GynoApp" />
<ion-content>
  <div class="px-4 pt-4 pb-4">

    <gyno-search-bar
      class="mb-6 block"
      placeholder="Buscar pacientes..."
      (search)="onSearch($event)"
    />

    <gyno-section-header
      icon="mgc_history_anticlockwise_line"
      title="Recientes"
      actionLabel="Ver todos"
      (action)="onViewAll()"
    />

    <gyno-horizontal-scroll class="mb-8 block">
      @for (patient of recentPatients; track patient.id) {
      <gyno-recent-card
        [patient]="patient"
        (clicked)="onRecentCardClicked(patient)"
      />
      }
    </gyno-horizontal-scroll>

    <gyno-patient-table
      [patients]="patients()"
      [totalCount]="totalCount"
      [pageSize]="pageSize"
      [currentPage]="currentPage"
      [filterActive]="sortField !== ''"
      (filter)="onFilter($event)"
      (rowAction)="onRowAction($event)"
      (pageChange)="onPageChange($event)"
    />
  </div>

  <gyno-fab icon="mgc_add_line" (clicked)="onAddConsultation()" />
</ion-content>

<gyno-filter-popover *ngIf="false" />
<gyno-action-popover *ngIf="false" />
<gyno-bottom-nav />
