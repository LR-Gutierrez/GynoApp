<div class="flex items-center justify-between gap-3">
  <p class="m-0 font-sans text-xs text-on-surface-variant">
    Mostrando {{ startItem() }}–{{ endItem() }} de {{ totalItems() }}
  </p>
  <div class="flex gap-1.5">
    <button
      type="button"
      class="w-9 h-9 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface-variant inline-flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-surface-container-low hover:text-on-surface disabled:opacity-40 disabled:cursor-not-allowed"
      [disabled]="!canPrev()"
      aria-label="Página anterior"
      (click)="prev()"
    >
      <i class="not-italic text-base mgc_arrow_left_line"></i>
    </button>
    <button
      type="button"
      class="w-9 h-9 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface-variant inline-flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-surface-container-low hover:text-on-surface disabled:opacity-40 disabled:cursor-not-allowed"
      [disabled]="!canNext()"
      aria-label="Página siguiente"
      (click)="next()"
    >
      <i class="not-italic text-base mgc_arrow_right_line"></i>
    </button>
  </div>
</div>
