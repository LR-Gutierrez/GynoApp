<gyno-topbar title="GynoApp" />
<ion-content>
  <div class="px-4 pt-4 pb-4">
    <gyno-search-bar
      class="mb-6 block"
      placeholder="Buscar pacientes..."
      (search)="onSearch($event)"
    />

    @if (recentPatients().length > 0) {
    <gyno-section-header
      icon="mgc_history_anticlockwise_line"
      title="Recientes"
      actionLabel="Ver todos"
      (action)="onViewAll()"
    />

    <gyno-horizontal-scroll class="mb-8 block">
      @for (patient of recentPatients(); track patient.consultationId) {
      <gyno-recent-card
        [patient]="patient"
        (clicked)="onRecentCardClicked(patient)"
      />
      }
    </gyno-horizontal-scroll>
    }

    <gyno-patient-table
      [patients]="patients()"
      [totalCount]="totalCount"
      [pageSize]="pageSize"
      [currentPage]="currentPage"
      [filterActive]="sortField !== ''"
      (filter)="onFilter($event)"
      (rowAction)="onRowAction($event)"
      (pageChange)="onPageChange($event)"
    />

    <ion-button class="mt-4 w-full" (click)="onAddConsultation()">
      <i class="not-italic text-lg text-white! mgc_add_line" slot="start"></i>
      Nuevo paciente
    </ion-button>
  </div>
</ion-content>

<gyno-filter-popover *ngIf="false" />
<gyno-action-popover *ngIf="false" />
<gyno-bottom-nav />
