<div class="flex flex-col items-center text-center py-6">
  <ion-icon [name]="icon()" class="text-5xl text-outline mb-3"></ion-icon>
  <p class="font-sans text-base font-semibold text-on-surface m-0 mb-1">{{ message() }}</p>
  @if (actionLabel()) {
    <ion-button class="btn-primary mt-3" (click)="action.emit()">
      <ion-icon slot="start" name="add"></ion-icon>
      {{ actionLabel() }}
    </ion-button>
  }
</div>
