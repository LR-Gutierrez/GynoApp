<div class="flex items-center justify-between gap-4">
  <p class="m-0 font-sans text-sm text-on-surface-variant">
    Mostrando {{ startItem() }}–{{ endItem() }} de {{ totalItems() }}
  </p>
  <div class="flex gap-2">
    <button
      type="button"
      class="w-11 h-11 border border-outline-variant rounded-xl bg-surface-container-lowest text-on-surface-variant inline-flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-surface-container-low hover:text-on-surface disabled:opacity-40 disabled:cursor-not-allowed"
      [disabled]="!canPrev()"
      aria-label="Página anterior"
      (click)="prev()"
    >
      <ion-icon name="chevron-back-outline" class="text-lg"></ion-icon>
    </button>
    <button
      type="button"
      class="w-11 h-11 border border-outline-variant rounded-xl bg-surface-container-lowest text-on-surface-variant inline-flex items-center justify-center cursor-pointer transition-all duration-200 hover:bg-surface-container-low hover:text-on-surface disabled:opacity-40 disabled:cursor-not-allowed"
      [disabled]="!canNext()"
      aria-label="Página siguiente"
      (click)="next()"
    >
      <ion-icon name="chevron-forward-outline" class="text-lg"></ion-icon>
    </button>
  </div>
</div>
