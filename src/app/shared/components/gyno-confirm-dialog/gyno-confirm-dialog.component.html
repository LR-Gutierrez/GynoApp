@if (visible()) {
  <div class="confirm-dialog fixed inset-0 z-[9999] flex items-center justify-center">
    <div class="confirm-backdrop absolute inset-0 bg-black/50 backdrop-blur-sm" (click)="cancel.emit()"></div>
    <div class="confirm-content relative bg-surface-container-lowest p-6 rounded-xl max-w-[340px] w-[90%] shadow-[0_8px_32px_rgba(0,0,0,0.15)]" (click)="$event.stopPropagation()">
      <h3 class="confirm-title font-sans text-lg font-semibold text-on-surface m-0 mb-2">{{ title() }}</h3>
      <p class="confirm-message font-sans text-sm text-on-surface-variant m-0 mb-5 leading-relaxed">{{ message() }}</p>
      <div class="confirm-actions flex gap-2 justify-end">
        <ion-button fill="outline" class="btn-outline-secondary" (click)="cancel.emit()">{{ cancelText() }}</ion-button>
        <ion-button class="btn-primary" (click)="confirm.emit()">{{ confirmText() }}</ion-button>
      </div>
    </div>
  </div>
}
