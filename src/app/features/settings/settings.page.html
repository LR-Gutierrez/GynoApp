<gyno-topbar title="Ajustes" />

<ion-content>
  <div class="px-3 sm:px-4 pt-3 sm:pt-4 pb-6 flex flex-col gap-5">
    <div
      class="bg-surface-container-lowest rounded-xl border border-outline-variant p-4 sm:p-5"
    >
      <h3
        class="font-sans text-xs font-semibold text-on-surface-variant tracking-wide uppercase m-0 mb-3 flex items-center gap-2"
      >
        <i class="not-italic text-sm mgc_shield_line"></i>
        Seguridad
      </h3>
      <div class="flex flex-col gap-1">
        <button
          type="button"
          class="flex items-center gap-3 w-full p-3 rounded-xl border-0 bg-transparent  cursor-pointer text-left transition-colors"
          (click)="openChangePin()"
        >
          <div
            class="w-9 h-9 rounded-xl bg-primary-fixed text-primary-700 flex items-center justify-center shrink-0"
          >
            <i class="not-italic text-lg mgc_lock_line"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-sans text-sm font-medium text-on-surface m-0">
              Cambiar PIN
            </p>
            <p class="font-sans text-xs text-on-surface-variant m-0">
              Actualiza tu código de seguridad
            </p>
          </div>
          <div class="flex items-center justify-center shrink-0 w-6">
            <i class="not-italic text-lg text-outline mgc_arrow_right_line"></i>
          </div>
        </button>

        <div
          class="flex items-center gap-3 w-full p-3 px-3 rounded-xl bg-transparent  transition-colors"
        >
          <div
            class="w-9 h-9 rounded-xl bg-primary-fixed text-primary-700 flex items-center justify-center shrink-0"
          >
            <i class="not-italic text-lg mgc_fingerprint_line"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-sans text-sm font-medium text-on-surface m-0">
              Biométrico
            </p>
            <p class="font-sans text-xs text-on-surface-variant m-0">
              Acceso con huella digital
            </p>
          </div>
          <div class="flex items-center justify-center shrink-0 w-6">
            <ion-toggle
              [checked]="biometricEnabled()"
              (ionChange)="toggleBiometric($event.detail.checked)"
              color="primary"
              style="
                --padding-start: 0;
                --padding-end: 0;
                margin: 0;
                width: 44px;
                overflow: visible;
              "
            />
          </div>
        </div>
      </div>
    </div>

    <div
      class="bg-surface-container-lowest rounded-xl border border-outline-variant p-4 sm:p-5"
    >
      <h3
        class="font-sans text-xs font-semibold text-on-surface-variant tracking-wide uppercase m-0 mb-3 flex items-center gap-2"
      >
        <i class="not-italic text-sm mgc_world_line"></i>
        Idioma y notificaciones
      </h3>
      <div class="flex flex-col gap-1">
        <button
          type="button"
          class="flex items-center gap-3 w-full p-3 rounded-xl border-0 bg-transparent  cursor-pointer text-left transition-colors"
          (click)="selectLanguage()"
        >
          <div
            class="w-9 h-9 rounded-xl bg-primary-fixed text-primary-700 flex items-center justify-center shrink-0"
          >
            <i class="not-italic text-lg mgc_translate_2_line"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-sans text-sm font-medium text-on-surface m-0">
              Idioma
            </p>
            <p class="font-sans text-xs text-on-surface-variant m-0">
              {{ language() }}
            </p>
          </div>
          <div class="flex items-center justify-center shrink-0 w-6">
            <i class="not-italic text-lg text-outline mgc_arrow_right_line"></i>
          </div>
        </button>

        <div
          class="flex items-center gap-3 w-full p-3 px-3 rounded-xl bg-transparent  transition-colors"
        >
          <div
            class="w-9 h-9 rounded-xl bg-primary-fixed text-primary-700 flex items-center justify-center shrink-0"
          >
            <i class="not-italic text-lg mgc_notification_line"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-sans text-sm font-medium text-on-surface m-0">
              Notificaciones
            </p>
            <p class="font-sans text-xs text-on-surface-variant m-0">
              Alertas de citas y recordatorios
            </p>
          </div>
          <div class="flex items-center justify-center shrink-0 w-6">
            <ion-toggle
              [checked]="notificationsEnabled()"
              (ionChange)="notificationsEnabled.set($event.detail.checked)"
              color="primary"
              style="
                --padding-start: 0;
                --padding-end: 0;
                margin: 0;
                width: 44px;
                overflow: visible;
              "
            />
          </div>
        </div>
      </div>
    </div>

    <div
      class="bg-surface-container-lowest rounded-xl border border-outline-variant p-4 sm:p-5"
    >
      <h3
        class="font-sans text-xs font-semibold text-on-surface-variant tracking-wide uppercase m-0 mb-3 flex items-center gap-2"
      >
        <i class="not-italic text-sm mgc_storage_line"></i>
        Datos
      </h3>
      <div class="flex flex-col gap-1">
        <button
          type="button"
          class="flex items-center gap-3 w-full p-3 rounded-xl border-0 bg-transparent  cursor-pointer text-left transition-colors"
          (click)="exportHistory()"
        >
          <div
            class="w-9 h-9 rounded-xl bg-primary-fixed text-primary-700 flex items-center justify-center shrink-0"
          >
            <i class="not-italic text-lg mgc_download_2_line"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-sans text-sm font-medium text-on-surface m-0">
              Exportar historial
            </p>
            <p class="font-sans text-xs text-on-surface-variant m-0">
              Descarga el historial completo de citas
            </p>
          </div>
          <div class="flex items-center justify-center shrink-0 w-6">
            <i class="not-italic text-lg text-outline mgc_arrow_right_line"></i>
          </div>
        </button>

        <button
          type="button"
          class="flex items-center gap-3 w-full p-3 rounded-xl border-0 bg-transparent  cursor-pointer text-left transition-colors"
          (click)="cleanCache()"
        >
          <div
            class="w-9 h-9 rounded-xl bg-primary-fixed text-primary-700 flex items-center justify-center shrink-0"
          >
            <i class="not-italic text-lg mgc_delete_2_line"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-sans text-sm font-medium text-on-surface m-0">
              Limpiar caché
            </p>
            <p class="font-sans text-xs text-on-surface-variant m-0">
              Libera espacio de almacenamiento temporal
            </p>
          </div>
          <div class="flex items-center justify-center shrink-0 w-6">
            <i class="not-italic text-lg text-outline mgc_arrow_right_line"></i>
          </div>
        </button>
      </div>
    </div>

    <div
      class="bg-surface-container-lowest rounded-xl border border-outline-variant p-4 sm:p-5"
    >
      <h3
        class="font-sans text-xs font-semibold text-on-surface-variant tracking-wide uppercase m-0 mb-3 flex items-center gap-2"
      >
        <i class="not-italic text-sm mgc_information_line"></i>
        Acerca de
      </h3>
      <div class="flex flex-col gap-1">
        <button
          type="button"
          class="flex items-center gap-3 w-full p-3 rounded-xl border-0 bg-transparent  cursor-pointer text-left transition-colors"
          (click)="openPrivacy()"
        >
          <div
            class="w-9 h-9 rounded-xl bg-primary-fixed text-primary-700 flex items-center justify-center shrink-0"
          >
            <i class="not-italic text-lg mgc_shield_line"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-sans text-sm font-medium text-on-surface m-0">
              Aviso de privacidad
            </p>
          </div>
          <div class="flex items-center justify-center shrink-0 w-6">
            <i class="not-italic text-lg text-outline mgc_arrow_right_line"></i>
          </div>
        </button>

        <button
          type="button"
          class="flex items-center gap-3 w-full p-3 rounded-xl border-0 bg-transparent  cursor-pointer text-left transition-colors"
          (click)="openTerms()"
        >
          <div
            class="w-9 h-9 rounded-xl bg-primary-fixed text-primary-700 flex items-center justify-center shrink-0"
          >
            <i class="not-italic text-lg mgc_document_2_line"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-sans text-sm font-medium text-on-surface m-0">
              Términos y condiciones
            </p>
          </div>
          <div class="flex items-center justify-center shrink-0 w-6">
            <i class="not-italic text-lg text-outline mgc_arrow_right_line"></i>
          </div>
        </button>

        <button
          type="button"
          class="flex items-center gap-3 w-full p-3 rounded-xl border-0 bg-transparent  cursor-pointer text-left transition-colors"
          (click)="openSupport()"
        >
          <div
            class="w-9 h-9 rounded-xl bg-primary-fixed text-primary-700 flex items-center justify-center shrink-0"
          >
            <i class="not-italic text-lg mgc_headphone_line"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-sans text-sm font-medium text-on-surface m-0">
              Soporte técnico
            </p>
            <p class="font-sans text-xs text-on-surface-variant m-0">
              Ayuda y contacto
            </p>
          </div>
          <div class="flex items-center justify-center shrink-0 w-6">
            <i class="not-italic text-lg text-outline mgc_arrow_right_line"></i>
          </div>
        </button>
      </div>
    </div>

    <button
      type="button"
      class="flex items-center justify-center gap-2 w-full p-3.5 rounded-xl border border-outline-variant bg-surface-container-lowest text-error cursor-pointer transition-colors font-sans text-sm font-semibold disabled:opacity-50"
      (click)="logout()"
      [disabled]="logoutLoading()"
    >
      @if (logoutLoading()) {
        <ion-spinner name="dots" color="danger" class="w-5 h-5" />
      } @else {
        <i class="not-italic text-lg mgc_exit_line"></i>
      }
      {{ logoutLoading() ? 'Cerrando sesión...' : 'Cerrar sesión' }}
    </button>
  </div>
</ion-content>

<gyno-pin-input
  [visible]="showChangePin()"
  [title]="changePinTitle"
  [subtitle]="changePinSubtitle"
  [error]="pinError()"
  [showBack]="changePinShowBack"
  [showConfirm]="changePinShowConfirm"
  confirmLabel="Cambiar PIN"
  [confirmDisabled]="pinLoading()"
  [resetKey]="(changePinStep() === 'old' ? 0 : changePinStep() === 'new' ? 1 : 2) + resetPinFlag()"
  (pinComplete)="onPinComplete($event)"
  (back)="onPinBack()"
  (confirm)="onPinConfirm()"
  (cancel)="onPinCancel()"
/>

<gyno-bottom-nav />
